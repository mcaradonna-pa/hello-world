<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCD Migration for FreePrints Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1917;
      --muted: #57534e;
      --line: #d6d3d1;
      --surface: #ffffff;
      --wash: #f5f0eb;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(15, 118, 110, 0.08), transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 0%, rgba(120, 113, 108, 0.06), transparent 45%),
        linear-gradient(180deg, var(--wash) 0%, #ebe6e0 100%);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 3rem;
      animation: rise 0.7s ease-out both;
    }

    .brand {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .brand em {
      font-style: italic;
      color: var(--accent);
    }

    .lede {
      margin-top: 1rem;
      max-width: 36rem;
      font-size: 1.125rem;
      line-height: 1.65;
      color: var(--muted);
      animation: rise 0.7s ease-out 0.12s both;
    }

    .comparisons {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .comparison {
      animation: rise 0.7s ease-out 0.24s both;
    }

    .comparison-copy {
      margin-bottom: 1.25rem;
      max-width: 40rem;
    }

    .comparison-copy h2 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .comparison-copy p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .shot {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .shot-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .shot-frame {
      aspect-ratio: 9 / 16;
      max-height: 560px;
      background:
        linear-gradient(145deg, #fafaf9 0%, #e7e5e4 100%);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .shot-frame img,
    .shot-frame video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0c0a09;
    }

    .shot-placeholder {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      font-size: 0.875rem;
      color: var(--muted);
      animation: rise 0.7s ease-out 0.36s both;
    }

    footer a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 2.5rem 1.25rem 3rem;
      }

      .pair {
        grid-template-columns: 1fr;
        gap: 1.75rem;
      }

      .shot-frame {
        max-height: none;
        aspect-ratio: 9 / 16;
        max-width: 320px;
        margin: 0 auto;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1 class="brand">UCD Migration for <em>FreePrints Cards</em></h1>
      <p class="lede">
        Side-by-side comparison of the current experience and the UCD migration.
        Screenshots and notes will be added below.
      </p>
    </header>

    <main class="comparisons">
      <section class="comparison" aria-labelledby="comparison-1">
        <div class="comparison-copy">
          <h2 id="comparison-1">Comparison</h2>
          <p>Notes describing the differences will go here.</p>
        </div>
        <div class="pair">
          <figure class="shot">
            <figcaption class="shot-label">Before</figcaption>
            <div class="shot-frame">
              <span class="shot-placeholder">Screenshot placeholder</span>
            </div>
          </figure>
          <figure class="shot">
            <figcaption class="shot-label">After</figcaption>
            <div class="shot-frame">
              <span class="shot-placeholder">Screenshot placeholder</span>
            </div>
          </figure>
        </div>
      </section>
    </main>

    <footer>
      Hosted on <a href="https://github.com/mcaradonna-pa/hello-world">GitHub Pages</a>
    </footer>
  </div>
</body>
</html>
