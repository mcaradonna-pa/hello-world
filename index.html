<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World — Frog Pond</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pond: #e8f4ef;
      --water: #b8ddd0;
      --lily: #7cb87a;
      --frog: #5a9a4e;
      --frog-dark: #3d7344;
      --cream: #faf8f3;
      --ink: #1a2e24;
      --muted: #5c7368;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(165deg, var(--cream) 0%, var(--pond) 45%, var(--water) 100%);
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--frog-dark);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      border: 1px solid rgba(90, 154, 78, 0.25);
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2.4rem, 6vw, 3.75rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--muted);
      max-width: 32rem;
      margin: 0 auto;
      line-height: 1.6;
    }

    .pond {
      position: relative;
      background: linear-gradient(180deg, #c5e8dc 0%, #9fd4c4 100%);
      border-radius: 2rem;
      padding: 2.5rem 1.5rem 3rem;
      box-shadow:
        0 24px 48px rgba(26, 46, 36, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .pond::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.35) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0%, transparent 40%);
      pointer-events: none;
    }

    .frogs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      position: relative;
      z-index: 1;
    }

    .frog-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: bob 4s ease-in-out infinite;
    }

    .frog-card:nth-child(2) { animation-delay: -1.3s; }
    .frog-card:nth-child(3) { animation-delay: -2.6s; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .lily-pad {
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 35% 35%, #8ec87c, var(--lily));
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(26, 46, 36, 0.12);
    }

    .lily-pad svg {
      width: 72px;
      height: 72px;
    }

    .frog-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--frog-dark);
    }

    .message {
      margin-top: 2.5rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .message p {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      color: var(--ink);
    }

    .message span {
      display: block;
      margin-top: 0.5rem;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
    }

    footer a {
      color: var(--frog-dark);
      font-weight: 500;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="badge">Hello, World</div>
      <h1>Welcome to the Frog Pond</h1>
      <p class="subtitle">A calm little corner of the internet, populated entirely by excellent frogs.</p>
    </header>

    <section class="pond" aria-label="Frog pond">
      <div class="frogs">
        <div class="frog-card">
          <div class="lily-pad">
            <svg viewBox="0 0 100 100" aria-hidden="true">
              <ellipse cx="50" cy="58" rx="32" ry="28" fill="#5a9a4e"/>
              <ellipse cx="38" cy="38" rx="14" ry="16" fill="#5a9a4e"/>
              <ellipse cx="62" cy="38" rx="14" ry="16" fill="#5a9a4e"/>
              <circle cx="34" cy="36" r="5" fill="#fff"/>
              <circle cx="58" cy="36" r="5" fill="#fff"/>
              <circle cx="35" cy="37" r="2.5" fill="#1a2e24"/>
              <circle cx="59" cy="37" r="2.5" fill="#1a2e24"/>
              <ellipse cx="50" cy="52" rx="6" ry="3" fill="#3d7344"/>
            </svg>
          </div>
          <span class="frog-name">Pondsworth</span>
        </div>

        <div class="frog-card">
          <div class="lily-pad">
            <svg viewBox="0 0 100 100" aria-hidden="true">
              <ellipse cx="50" cy="60" rx="30" ry="26" fill="#6aad5c"/>
              <ellipse cx="36" cy="40" rx="13" ry="15" fill="#6aad5c"/>
              <ellipse cx="64" cy="40" rx="13" ry="15" fill="#6aad5c"/>
              <circle cx="32" cy="38" r="4.5" fill="#fff"/>
              <circle cx="56" cy="38" r="4.5" fill="#fff"/>
              <circle cx="33" cy="39" r="2" fill="#1a2e24"/>
              <circle cx="57" cy="39" r="2" fill="#1a2e24"/>
              <path d="M44 54 Q50 58 56 54" stroke="#3d7344" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="frog-name">Lily</span>
        </div>

        <div class="frog-card">
          <div class="lily-pad">
            <svg viewBox="0 0 100 100" aria-hidden="true">
              <ellipse cx="50" cy="57" rx="34" ry="29" fill="#4d8f42"/>
              <ellipse cx="37" cy="36" rx="15" ry="17" fill="#4d8f42"/>
              <ellipse cx="63" cy="36" rx="15" ry="17" fill="#4d8f42"/>
              <circle cx="33" cy="34" r="5" fill="#fff"/>
              <circle cx="57" cy="34" r="5" fill="#fff"/>
              <circle cx="34" cy="35" r="2.5" fill="#1a2e24"/>
              <circle cx="58" cy="35" r="2.5" fill="#1a2e24"/>
              <ellipse cx="50" cy="50" rx="8" ry="4" fill="#2f5c36"/>
              <ellipse cx="42" cy="48" rx="3" ry="2" fill="#c5e8a0" opacity="0.6"/>
              <ellipse cx="58" cy="48" rx="3" ry="2" fill="#c5e8a0" opacity="0.6"/>
            </svg>
          </div>
          <span class="frog-name">Ribbito</span>
        </div>
      </div>

      <div class="message">
        <p>Hello, World — from McAradonna</p>
        <span>These frogs approve of your visit. 🐸</span>
      </div>
    </section>

    <footer>
      Hosted on <a href="https://github.com/mcaradonna-pa/hello-world">GitHub Pages</a>
    </footer>
  </div>
</body>
</html>
